<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admiration Studio — create a keepsake 🌹</title>
<meta name="description" content="Type a name and get a personalized link plus a printable QR code for an animated rose that greets your person by name. A tiny, heartfelt gift. Primarly designed by author for his girlfriend, Iryna." />
<meta name="theme-color" content="#190610" />
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />

<!-- Open Graph / social preview -->
<meta property="og:type" content="website" />
<meta property="og:title" content="Admiration Studio — make a rose that knows their name 🌹" />
<meta property="og:description" content="Type a name, get a personalized link and a printable QR code. Tuck it into a card, a gift, or a quiet message." />
<meta property="og:image" content="./og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="https://msverlovych.github.io/someone-admires-you/create.html" />
<meta property="og:site_name" content="Someone, probably, admires you" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Admiration Studio — make a rose that knows their name 🌹" />
<meta name="twitter:description" content="Type a name, get a personalized link and a printable QR code for an animated rose." />
<meta name="twitter:image" content="./og.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./studio.css" />
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="form">
      <div class="eyebrow">admiration studio</div>
      <h1>Send a <span class="em">rose</span><br/>that knows their name.</h1>
      <p class="sub">Type a name, get a personalized link and a printable QR code. Tuck it into a card, a gift, or a quiet message.</p>

      <div class="field">
        <label for="to">To — their name</label>
        <input id="to" type="text" placeholder="e.g. Iryna" autocomplete="off" maxlength="40" />
      </div>

      <div class="field">
        <label for="from">From <span class="opt">— optional signature</span></label>
        <input id="from" type="text" placeholder="e.g. Max" autocomplete="off" maxlength="40" />
      </div>

      <div class="field">
        <label for="base">Published page link <span class="opt">— where the rose lives online</span></label>
        <input id="base" type="text" placeholder="https://your-site.com/admire/" autocomplete="off" />
        <div class="linkbox">
          <input id="link" type="text" readonly />
          <button class="btn" id="copy">Copy</button>
        </div>
      </div>

      <div class="note" id="note"></div>

      <div class="actions">
        <button class="btn btn--primary" id="download">↓ Download QR</button>
        <button class="btn" id="open">Open preview ↗</button>
      </div>
    </div>

    <div class="preview">
      <div class="qr-frame"><img id="qr" alt="QR code" /></div>
      <div class="qr-cap">scan me</div>
      <div class="live">
        <iframe id="live" title="live preview"></iframe>
        <span class="live-tag">live preview</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./studio.js"></script>
</body>
</html>
